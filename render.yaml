services:
  - type: web
    name: fitmind-ai
    runtime: node
    region: singapore
    plan: free
    buildCommand: npm install --include=dev && npx prisma generate && NODE_OPTIONS=--max-old-space-size=400 npm run build:webpack && cp -r .next/static .next/standalone/.next/static && cp -r public .next/standalone/public
    startCommand: sh scripts/start.sh
    healthCheckPath: /
    envVars:
      - key: NODE_ENV
        value: production
      - key: DATABASE_URL
        sync: false
      - key: NEXTAUTH_URL
        sync: false
      - key: NEXTAUTH_SECRET
        generateValue: true
      - key: GEMINI_API_KEY
        sync: false
      - key: RESEND_API_KEY
        sync: false
      - key: EMAIL_FROM
        sync: false
