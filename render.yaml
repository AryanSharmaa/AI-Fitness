services:
  - type: web
    name: fitmind-ai
    runtime: node
    region: singapore
    plan: free
    autoDeploy: true
    buildCommand: npm install --include=dev && npx prisma generate && npx prisma db push --accept-data-loss && NODE_OPTIONS=--max-old-space-size=400 npm run build:webpack
    startCommand: sh scripts/start.sh
    healthCheckPath: /
    envVars:
      - key: NODE_ENV
        value: production
      - key: DATABASE_URL
        sync: false
      - key: NEXTAUTH_URL
        sync: false
      - key: NEXTAUTH_SECRET
        generateValue: true
      - key: GEMINI_API_KEY
        sync: false
      - key: RESEND_API_KEY
        sync: false
      - key: EMAIL_FROM
        sync: false
