services:
  - type: web
    name: fitmind-ai
    runtime: node
    region: singapore
    plan: free
    autoDeploy: true
    buildCommand: npm install --include=dev && npx prisma generate && NODE_OPTIONS=--max-old-space-size=460 npm run build
    startCommand: npx next start -p $PORT
    healthCheckPath: /
    envVars:
      - key: NODE_ENV
        value: production
      - key: DATABASE_URL
        sync: false
      - key: NEXTAUTH_URL
        sync: false
      - key: NEXTAUTH_SECRET
        generateValue: true
      - key: GEMINI_API_KEY
        sync: false
      - key: RESEND_API_KEY
        sync: false
      - key: EMAIL_FROM
        sync: false
