services:
  - type: web
    name: fitmind-ai
    runtime: node
    region: singapore
    plan: free
    autoDeploy: true
    nodeVersion: 20.9.0
    buildCommand: npm install --include=dev && NODE_OPTIONS=--max-old-space-size=500 npm run deploy
    startCommand: npx next start -p $PORT
    healthCheckPath: /
    envVars:
      - key: NODE_ENV
        value: production
      - key: DATABASE_URL
        sync: false
      - key: NEXTAUTH_URL
        sync: false
      - key: NEXTAUTH_SECRET
        generateValue: true
      - key: OPENROUTER_API_KEY
        sync: false
      - key: RESEND_API_KEY
        sync: false
      - key: EMAIL_FROM
        sync: false
      - key: RAZORPAY_KEY_ID
        sync: false
      - key: RAZORPAY_KEY_SECRET
        sync: false
      - key: NEXT_PUBLIC_RAZORPAY_KEY_ID
        sync: false
      - key: ADMIN_EMAILS
        sync: false
